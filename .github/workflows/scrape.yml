name: Scrape FEFI & Futsal

on:
  # Diario a las 04:00 UTC (01:00 hora Argentina)
  schedule:
    - cron: '0 4 * * *'

  # También dispara en cada push al scraper, para testear cambios
  push:
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape.yml'

  # Disparable manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write   # necesario para que el bot commitee data/fefi-data.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Run FEFI scraper
        run: python scraper/scraper_fefi.py

      - name: Run Futsal fetcher
        run: python scraper/scraper_futsal.py

      - name: Commit & push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/fefi-data.json data/futsal-data.json
            git commit -m "🤖 update data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Datos actualizados"
          else
            echo "ℹ️ Sin cambios — no se commitea"
          fi
