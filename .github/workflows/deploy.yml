paths:
  - 'index.html'
  - 'app.js'
  - 'futsal.js'
  - 'styles.css'
  - 'images/**'
  - 'data/**'

# Y en el build step:
run: |
  mkdir -p dist/data dist/images
  cp index.html app.js futsal.js styles.css dist/
  cp -r images/* dist/images/ 2>/dev/null || true
  cp data/fefi-data.json dist/data/
  cp data/futsal-data.json dist/data/
