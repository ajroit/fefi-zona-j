name: Deploy a GitHub Pages

on:
  # Cada vez que cambian los archivos del sitio en main
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'app.js'
      - 'futsal.js'
      - 'futsal_reducido.js'
      - 'futsal_femenino.js'
      - 'futsal_stats.js'
      - 'match.html'
      - 'match.js'
      - 'share.js'
      - 'weather.js'
      - 'predictions.html'
      - 'predictions.js'
      - 'styles.css'
      - 'manifest.json'
      - 'sw.js'
      - 'images/**'
      - 'data/**'
      - '.github/workflows/deploy.yml'

  workflow_run:
    workflows: ["Scrape FEFI & Futsal"]
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Armar carpeta de publicación
        run: |
          mkdir -p dist/data dist/images
          cp index.html app.js futsal.js futsal_reducido.js futsal_femenino.js futsal_stats.js share.js weather.js match.html match.js styles.css dist/
          cp predictions.html predictions.js dist/
          cp manifest.json sw.js dist/
          cp -r images/* dist/images/ 2>/dev/null || true
          cp data/fefi-data.json dist/data/
          cp data/futsal-data.json dist/data/
          cp data/futsal-duelos-data.json dist/data/
          cp data/futsal-reducido-data.json dist/data/
          cp data/futsal-femenino-data.json dist/data/ 2>/dev/null || true
          cp data/futsal-stats.json dist/data/ 2>/dev/null || true
          cp data/predictions.json dist/data/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
