<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a8c4a">
  <meta name="description" content="Dashboard del torneo FEFI 2026 - Club Social y Deportivo Villa Sahores, Zona J">
  <title>Villa Sahores - Dashboard Deportivo</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA (Apple) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sahores">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">

  <!-- Android / General -->
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="images/icon-512.png">
  <link rel="shortcut icon" href="images/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KBW05P5Q7M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KBW05P5Q7M');

    // Helper global para trackear eventos personalizados
    window.trackEvent = function(eventName, eventParams) {
      if (typeof gtag === "function") {
        gtag("event", eventName, eventParams);
      } else {
        console.log("Analytics event:", eventName, eventParams);
      }
    };
  </script>
</head>
<body>
  <!-- Sport Selector -->
  <nav class="sport-selector" id="sport-selector">
    <div class="container sport-selector-row">
      <button class="sport-btn active" data-sport="babyfutbol" id="sport-btn-babyfutbol">
        ⚽ Baby Fútbol
      </button>
      <button class="sport-btn" data-sport="futsal" id="sport-btn-futsal">
        🏟️ Futsal - Liga de Honor
      </button>
      <button class="sport-btn" data-sport="futsal-reducido" id="sport-btn-futsal-reducido">
        🏟️ Futsal - Reducido
      </button>
      <button class="sport-btn" data-sport="futsal-femenino" id="sport-btn-futsal-femenino">
        🏟️ Futsal - Femenino
      </button>
    </div>
  </nav>

  <!-- Hero Header -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="container hero-content">
      <div class="hero-left">
        <img src="images/logo-sahores.jpeg" alt="Escudo Villa Sahores" class="club-logo">
        <div class="hero-text">
          <h1>Villa Sahores</h1>
          <p class="hero-subtitle" id="hero-subtitle">Club Social y Deportivo - Desde 1931</p>
        </div>
      </div>
      <div class="hero-right">
        <div class="tournament-badge" id="tournament-badge">
          <span class="badge-label" id="badge-label">Torneo FEFI 2026</span>
          <span class="badge-zona" id="badge-zona">Zona J</span>
        </div>
        <div class="updated" id="updated"></div>
      </div>
    </div>
  </header>

  <!-- Sub Tournament Selector for Futsal Liga de Honor -->
  <div id="sub-tournament-container" class="sub-tournament-container" style="display: none;">
    <div class="container">
      <div class="sub-tournament-selector" id="sub-tournament-selector">
        <button class="sub-tab-btn active" data-sub="duelos">🏆 Torneo de Duelos</button>
        <button class="sub-tab-btn" data-sub="regular">📊 Fase Regular</button>
      </div>
    </div>
  </div>

  <!-- Navigation Tabs -->
  <nav class="nav-bar">
    <div class="container">
      <div class="cat-selector" id="cat-selector" role="tablist"></div>
    </div>
  </nav>

  <main class="container main-content">
    <!-- Stats Grid -->
    <section class="stats-grid" id="metrics"></section>

    <!-- Two Column Layout -->
    <div class="two-col">
      <!-- Left Column -->
      <div class="col-main">
        <!-- Proximo Partido -->
        <section class="card card-featured" id="next-match-section">
          <div class="card-header">
            <div class="card-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              <span>Proximo Partido</span>
            </div>
            <span class="card-badge" id="next-match-date"></span>
          </div>
          <div class="match-content">
            <div class="match-teams" id="next-match-teams"></div>
            <div class="match-meta" id="next-match-meta"></div>
            <div class="match-prediction" id="next-match-prediction"></div>
            <div class="match-scouting" id="next-match-scouting"></div>
            <div class="match-actions" id="next-match-actions"></div>
          </div>
        </section>

        <!-- Tabla de Posiciones -->
        <section class="card">
          <div class="card-header">
            <div class="card-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 21h8M12 17v4M6.5 3h11l2 7h-15l2-7z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
              <span>Tabla de Posiciones</span>
            </div>
            <span class="card-tag" id="table-cat-tag"></span>
          </div>
          <div class="table-wrapper">
            <table class="standings" id="standings"></table>
          </div>
        </section>

        <!-- Estadísticas de Goleadores y Tarjetas -->
        <section class="card" id="futsal-stats-card" style="display: none;">
          <div class="card-header">
            <div class="card-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="7"></circle>
                <path d="M5.5 21l3-8 7 8"></path>
              </svg>
              <span>Estadísticas de Jugadores</span>
            </div>
            <span class="card-tag" id="futsal-stats-cat-tag"></span>
          </div>
          <div class="table-wrapper">
            <table class="standings" id="futsal-stats-table"></table>
          </div>
        </section>
      </div>

      <!-- Right Column -->
      <div class="col-side">
        <!-- Forma Reciente -->
        <section class="card">
          <div class="card-header">
            <div class="card-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
              </svg>
              <span>Forma Reciente</span>
            </div>
            <span class="card-tag" id="form-cat-tag"></span>
          </div>
          <div class="form-row" id="form-row"></div>
        </section>

        <!-- Historial -->
        <section class="card">
          <div class="card-header">
            <div class="card-title">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              <span>Historial</span>
            </div>
            <span class="card-tag" id="history-cat-tag"></span>
          </div>
          <div class="history-list" id="history-list"></div>
        </section>
      </div>
    </div>

    <!-- Calendario Full Width -->
    <section class="card">
      <div class="card-header">
        <div class="card-title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>Calendario Completo</span>
        </div>
      </div>
      <div class="schedule-grid" id="schedule"></div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <img src="images/logo-sahores.jpeg" alt="Villa Sahores" class="footer-logo">
        <div class="footer-text">
          <p>Club Social y Deportivo Villa Sahores - Fundado en 1931</p>
          <p class="footer-credits" id="footer-credits">Datos de <a href="https://fefi.com.ar/2026-torneo-anual-baby-futbol/j/" target="_blank" rel="noopener">fefi.com.ar</a></p>
        </div>
      </div>
    </div>
  </footer>

  <script src="weather.js?v=5"></script>
  <script src="share.js?v=5"></script>
  <script src="futsal_stats.js?v=5"></script>
  <script src="futsal.js?v=5"></script>
  <script src="futsal_reducido.js?v=5"></script>
  <script src="futsal_femenino.js?v=5"></script>
  <script src="app.js?v=5"></script>

  <!-- Service Worker para PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        // Register sw.js with a cache buster parameter to force the browser to check for changes
        navigator.serviceWorker.register('/sw.js?v=5').then(function(reg) {
          console.log('✅ Service Worker registrado:', reg.scope);
        }).catch(function(err) {
          console.log('⚠️ Service Worker error:', err);
        });
      });
    }
  </script>
</body>
</html>
